<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Прототип: рабочий экран v2</title>
<link rel="stylesheet" href="styles.css">
<style>
  .proto-banner{position:fixed;top:0;left:0;right:0;z-index:50;background:#000;color:#fff;
    font-family:var(--font-body);font-size:12px;text-align:center;padding:6px 10px;
    display:flex;justify-content:center;gap:14px;flex-wrap:wrap;}
  .proto-banner a{color:#fff;text-decoration:underline;}
  body{padding-top:30px;}

  /* ===== кольцо прогресса фазы ===== */
  .run-ring{position:relative;width:min(74vw,300px);height:min(74vw,300px);
    display:flex;align-items:center;justify-content:center;flex:none;
    --ring-accent:#ffcf5c;}
  .run-ring-track{position:absolute;inset:0;border-radius:50%;
    background:conic-gradient(var(--ring-accent) calc(var(--pct,100)*1%), rgba(255,255,255,.2) 0);
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 12px), #000 calc(100% - 12px));
    mask:radial-gradient(farthest-side, transparent calc(100% - 12px), #000 calc(100% - 12px));
    transition:filter .15s ease;}
  .run-ring.pulse-flash .run-ring-track{filter:brightness(1.3);}
  .run-ring .run-time{position:relative;color:#fff;}

  /* ===== пульс на последних секундах ===== */
  @keyframes pulseTime{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
  .run-time.pulse{animation:pulseTime .5s ease-in-out infinite;}

  /* ===== точки циклов ===== */
  .run-dots{display:flex;align-items:center;gap:9px;padding-top:4px;}
  .run-dots .dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.32);
    transition:transform .15s ease,background .15s ease,box-shadow .15s ease;flex:none;}
  .run-dots .dot.done{background:rgba(255,255,255,.9);}
  .run-dots .dot.current{background:#fff;transform:scale(1.25);
    box-shadow:0 0 0 4px rgba(255,255,255,.25);}

  .proto-controls{display:flex;gap:8px;justify-content:center;padding:6px 0 2px;flex-wrap:wrap;}
  .proto-controls button{font-family:var(--font-body);font-size:12px;padding:6px 10px;
    border-radius:8px;border:1px solid rgba(255,255,255,.5);background:rgba(255,255,255,.12);
    color:#fff;cursor:pointer;}
</style>
</head>
<body data-view="run">

<div class="proto-banner">
  <span>Прототип рабочего экрана — короткие демо-интервалы для наглядности, не боевая логика</span>
  <a href="index.html">← к рабочему таймеру</a>
</div>

<div class="run" id="viewRun" data-phase="prep">
  <button class="run-back" type="button" aria-label="Назад к настройкам">← Настройки</button>

  <div class="run-center">
    <span class="run-phase-label" id="runPhaseLabel">Приготовиться</span>

    <div class="run-ring" id="runRing" style="--pct:100">
      <div class="run-ring-track"></div>
      <span class="run-time" id="runTime">00:03</span>
    </div>

    <span class="run-round-info" id="runRoundInfo">Подготовка</span>
    <div class="run-dots" id="runDots"></div>
  </div>

  <span class="run-total" id="runTotal">Осталось всего: 00:32</span>

  <div class="proto-controls">
    <button type="button" id="restartDemo">Рестарт демо</button>
    <span style="align-self:center;color:rgba(255,255,255,.7);font-size:11px;">демо: prep 3с · work 6с · rest 3с · 4 цикла · cooldown 4с</span>
  </div>

  <div class="run-controls">
    <button class="ctrl secondary" id="prevCycleBtn" type="button" aria-label="Предыдущий цикл">‹</button>
    <button class="ctrl primary" id="pauseBtn" type="button">Пауза</button>
    <button class="ctrl secondary" id="nextCycleBtn" type="button" aria-label="Следующий цикл">›</button>
  </div>
</div>

<script>
(function(){
  // ---- демо-конфигурация (только для показа дизайна, не боевые числа) ----
  const CYCLES = 4;
  const D = { prep: 3000, work: 6000, rest: 3000, cooldown: 4000 };
  const LABELS = { prep:'Приготовиться', work:'Работа', rest:'Отдых', cooldown:'Заминка', done:'Готово!' };

  function buildPhases(){
    const list = [{type:'prep', duration:D.prep, cycle:0}];
    for(let c=1;c<=CYCLES;c++){
      list.push({type:'work', duration:D.work, cycle:c});
      list.push({type:'rest', duration:D.rest, cycle:c});
    }
    list.push({type:'cooldown', duration:D.cooldown, cycle:CYCLES});
    list.push({type:'done', duration:0, cycle:CYCLES});
    return list;
  }

  let phases = buildPhases();
  let idx = 0;
  let phaseEndAt = 0;      // timestamp когда текущая фаза закончится
  let pausedRemainingMs = null; // если на паузе — сколько осталось
  let running = false;
  let rafId = null;

  const el = {
    run: document.getElementById('viewRun'),
    phaseLabel: document.getElementById('runPhaseLabel'),
    ring: document.getElementById('runRing'),
    time: document.getElementById('runTime'),
    roundInfo: document.getElementById('runRoundInfo'),
    dots: document.getElementById('runDots'),
    total: document.getElementById('runTotal'),
    pauseBtn: document.getElementById('pauseBtn'),
    prevBtn: document.getElementById('prevCycleBtn'),
    nextBtn: document.getElementById('nextCycleBtn'),
    restartBtn: document.getElementById('restartDemo'),
  };

  function fmt(ms){
    const s = Math.max(0, Math.ceil(ms/1000));
    const m = Math.floor(s/60), r = s%60;
    return String(m).padStart(2,'0')+':'+String(r).padStart(2,'0');
  }

  function renderDots(phase){
    el.dots.innerHTML = '';
    for(let i=1;i<=CYCLES;i++){
      const d = document.createElement('span');
      d.className = 'dot';
      if(phase.type==='cooldown' || phase.type==='done' || phase.cycle > i){
        d.className += ' done';
      } else if(phase.cycle === i && (phase.type==='work'||phase.type==='rest')){
        d.className += ' current';
      }
      el.dots.appendChild(d);
    }
  }

  function roundInfoText(phase){
    if(phase.type==='prep') return 'Подготовка';
    if(phase.type==='cooldown') return 'Заминка';
    if(phase.type==='done') return 'Тренировка завершена';
    return 'Цикл '+phase.cycle+' из '+CYCLES;
  }

  function totalRemainingMs(currentRemaining){
    let sum = currentRemaining;
    for(let i=idx+1;i<phases.length;i++) sum += phases[i].duration;
    return sum;
  }

  function startPhase(i){
    idx = i;
    const phase = phases[idx];
    el.run.dataset.phase = phase.type;
    el.phaseLabel.textContent = LABELS[phase.type];
    el.roundInfo.textContent = roundInfoText(phase);
    renderDots(phase);
    phaseEndAt = performance.now() + phase.duration;
    pausedRemainingMs = null;
    if(phase.type==='done'){
      el.time.textContent = '00:00';
      el.ring.style.setProperty('--pct', 100);
      el.total.textContent = 'Осталось всего: 00:00';
      running = false;
      el.pauseBtn.textContent = 'Пауза';
      return;
    }
  }

  function tick(){
    const phase = phases[idx];
    if(phase.type==='done'){ rafId = null; return; }
    const now = performance.now();
    const remaining = running ? Math.max(0, phaseEndAt - now) : (pausedRemainingMs ?? 0);
    const pct = phase.duration ? (remaining/phase.duration*100) : 0;
    el.ring.style.setProperty('--pct', pct.toFixed(2));
    el.time.textContent = fmt(remaining);
    el.total.textContent = 'Осталось всего: '+fmt(totalRemainingMs(remaining));

    const lastSeconds = remaining <= 3000 && remaining > 0;
    el.time.classList.toggle('pulse', lastSeconds);
    el.ring.classList.toggle('pulse-flash', lastSeconds);

    if(running && remaining <= 0){
      if(idx+1 < phases.length){ startPhase(idx+1); }
      else { startPhase(idx); }
    }
    rafId = requestAnimationFrame(tick);
  }

  function start(){
    if(!rafId){ rafId = requestAnimationFrame(tick); }
  }

  function togglePause(){
    const phase = phases[idx];
    if(phase.type==='done') return;
    if(running){
      pausedRemainingMs = Math.max(0, phaseEndAt - performance.now());
      running = false;
      el.pauseBtn.textContent = 'Продолжить';
    } else {
      phaseEndAt = performance.now() + (pausedRemainingMs ?? phase.duration);
      running = true;
      el.pauseBtn.textContent = 'Пауза';
      start();
    }
  }

  function jumpToCycleStart(cycleNum){
    const target = phases.findIndex(p => p.cycle === cycleNum && p.type==='work');
    if(target === -1) return;
    startPhase(target);
    if(running){ start(); }
  }

  el.pauseBtn.addEventListener('click', togglePause);
  el.prevBtn.addEventListener('click', function(){
    const cur = phases[idx].cycle;
    jumpToCycleStart(Math.max(1, cur - 1));
  });
  el.nextBtn.addEventListener('click', function(){
    const cur = phases[idx].cycle;
    jumpToCycleStart(Math.min(CYCLES, cur + 1));
  });
  el.restartBtn.addEventListener('click', function(){
    phases = buildPhases();
    running = true;
    el.pauseBtn.textContent = 'Пауза';
    startPhase(0);
    start();
  });

  // автостарт демо
  running = true;
  startPhase(0);
  start();
})();
</script>
</body>
</html>
